# ============================================================
# Railway 生产环境配置
# ============================================================
spring:
  thymeleaf:
    cache: true
  datasource:
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      max-lifetime: 600000

logging:
  level:
    root: WARN
    com.aistudy: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
