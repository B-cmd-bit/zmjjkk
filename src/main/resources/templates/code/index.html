<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI代码解释 - AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/style.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot"></i> AI校园学习助手</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> 聊天</a></li>
                    <li class="nav-item"><a class="nav-link" href="/article"><i class="bi bi-pencil"></i> 作文</a></li>
                    <li class="nav-item"><a class="nav-link" href="/plan"><i class="bi bi-calendar-check"></i> 计划</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/code"><i class="bi bi-code-slash"></i> 代码</a></li>
                </ul>
                <div class="d-flex" id="userNavArea">
                    <a href="/auth/login" class="btn btn-outline-light btn-sm me-2">登录</a>
                    <a href="/auth/register" class="btn btn-light btn-sm">注册</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white"><i class="bi bi-code-slash"></i> 输入代码</div>
                    <div class="card-body">
                        <textarea id="codeInput" class="form-control font-monospace" rows="15" placeholder="在此粘贴需要分析的代码..."></textarea>
                        <div class="mt-3 d-flex gap-2">
                            <button class="btn btn-success" onclick="explainCode()"><i class="bi bi-book"></i> 解释代码</button>
                            <button class="btn btn-warning" onclick="optimizeCode()"><i class="bi bi-lightning"></i> 优化代码</button>
                            <button class="btn btn-info text-white" onclick="addComments()"><i class="bi bi-chat-text"></i> 添加注释</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-light"><span id="codeResultTitle">分析结果</span></div>
                    <div class="card-body" id="codeResult" style="min-height: 400px; overflow-y: auto;">
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-code-slash" style="font-size: 3rem;"></i>
                            <p class="mt-2">粘贴代码，选择分析功能即可查看AI结果。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-3 mt-4 border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 AI校园学习助手系统</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.4/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/highlight.min.js"></script>
    <script th:src="@{/static/js/main.js}"></script>
</body>
</html>
