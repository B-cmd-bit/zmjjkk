<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学习计划 - AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/style.css}" rel="stylesheet">
    <link th:href="@{/static/css/highlight-github.min.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot"></i> AI校园学习助手</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> 聊天</a></li>
                    <li class="nav-item"><a class="nav-link" href="/article"><i class="bi bi-pencil"></i> 作文</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/plan"><i class="bi bi-calendar-check"></i> 计划</a></li>
                    <li class="nav-item"><a class="nav-link" href="/code"><i class="bi bi-code-slash"></i> 代码</a></li>
                </ul>
                <div class="d-flex" id="userNavArea">
                    <a href="/auth/login" class="btn btn-outline-light btn-sm me-2">登录</a>
                    <a href="/auth/register" class="btn btn-light btn-sm">注册</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white"><i class="bi bi-calendar-check"></i> 学习计划生成</div>
                    <div class="card-body">
                        <div class="mb-3"><label class="form-label">专业</label><input type="text" id="planMajor" class="form-control" placeholder="如：软件工程"></div>
                        <div class="mb-3"><label class="form-label">课程</label><input type="text" id="planCourse" class="form-control" placeholder="如：Spring Boot框架"></div>
                        <div class="mb-3"><label class="form-label">学习目标</label><textarea id="planGoal" class="form-control" rows="4" placeholder="描述学习目标..."></textarea></div>
                        <button class="btn btn-primary w-100" onclick="generatePlan()"><i class="bi bi-magic"></i> 生成计划</button>
                        <hr>
                        <h6><i class="bi bi-clock-history"></i> 历史计划</h6>
                        <div id="planHistory" class="list-group list-group-flush"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-light"><span id="planResultTitle">学习计划</span></div>
                    <div class="card-body" id="planResult" style="min-height: 400px;">
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-calendar-check" style="font-size: 3rem;"></i>
                            <p class="mt-2">输入专业、课程和目标，点击"生成计划"获取AI制定的学习计划。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-3 mt-4 border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 AI校园学习助手系统</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.4/marked.min.js"></script>
    <script th:src="@{/static/js/highlight.min.js}"></script>
    <script th:src="@{/static/js/main.js}"></script>
</body>
</html>
