<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2">创建新账户</h3>
                    <p class="text-muted">注册AI校园学习助手</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div id="alertBox" class="alert d-none"></div>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" placeholder="3-20个字符" required minlength="3" maxlength="20">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="email" placeholder="请输入邮箱地址" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" placeholder="至少6位密码" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">确认密码</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="再次输入密码" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">注 册</button>
                        </form>
                        <div class="text-center mt-3">
                            <small>已有账户？<a href="/auth/login">立即登录</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const alert = document.getElementById('alertBox');
            const pwd = document.getElementById('password').value;
            const cpwd = document.getElementById('confirmPassword').value;
            if (pwd !== cpwd) {
                alert.className = 'alert alert-danger';
                alert.textContent = '两次输入的密码不一致';
                alert.classList.remove('d-none');
                return;
            }
            try {
                const res = await axios.post('/api/auth/register', {
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: pwd,
                    confirmPassword: cpwd
                });
                alert.className = 'alert alert-success';
                alert.textContent = '注册成功！即将跳转到登录页...';
                alert.classList.remove('d-none');
                setTimeout(() => window.location.href = '/auth/login', 1500);
            } catch (err) {
                alert.className = 'alert alert-danger';
                alert.textContent = err.response?.data?.message || '注册失败';
                alert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
