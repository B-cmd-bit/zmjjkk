<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <i class="bi bi-robot text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2">AI校园学习助手</h3>
                    <p class="text-muted">登录您的账户</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div id="loginAlert" class="alert d-none"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">用户名或邮箱</label>
                                <input type="text" class="form-control" id="username" placeholder="请输入用户名或邮箱" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登 录</button>
                        </form>
                        <div class="text-center mt-3">
                            <small>还没有账户？<a href="/auth/register">立即注册</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const alert = document.getElementById('loginAlert');
            try {
                const res = await axios.post('/api/auth/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                });
                localStorage.setItem('token', res.data.data.token);
                localStorage.setItem('user', JSON.stringify(res.data.data.user));
                window.location.href = '/';
            } catch (err) {
                alert.className = 'alert alert-danger';
                alert.textContent = err.response?.data?.message || '登录失败';
                alert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
