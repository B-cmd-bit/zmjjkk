<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-speedometer2"></i> 管理后台</span>
            <div class="d-flex">
                <span class="text-light me-3" id="adminName">管理员</span>
                <a href="#" class="btn btn-outline-light btn-sm" onclick="adminLogout()">退出</a>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 bg-light min-vh-100 p-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="/admin/dashboard" class="nav-link active"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
                    <li class="nav-item"><a href="/admin/users" class="nav-link"><i class="bi bi-people"></i> 用户管理</a></li>
                    <li class="nav-item"><a href="/admin/chats" class="nav-link"><i class="bi bi-chat-dots"></i> 聊天管理</a></li>
                    <li class="nav-item"><a href="/admin/articles" class="nav-link"><i class="bi bi-file-text"></i> 文章管理</a></li>
                    <li class="nav-item"><a href="/admin/plans" class="nav-link"><i class="bi bi-calendar-check"></i> 计划管理</a></li>
                    <li class="nav-item"><a href="/admin/logs" class="nav-link"><i class="bi bi-journal"></i> 系统日志</a></li>
                </ul>
            </div>
            <div class="col-md-10 p-4">
                <h4>仪表盘</h4>
                <div class="row g-3 mt-2">
                    <div class="col-md-3">
                        <div class="card text-bg-primary"><div class="card-body"><h5 id="totalUsers">-</h5><small>用户总数</small></div></div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-bg-success"><div class="card-body"><h5 id="totalChats">-</h5><small>聊天记录</small></div></div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-bg-warning"><div class="card-body"><h5 id="totalArticles">-</h5><small>文章数量</small></div></div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-bg-info"><div class="card-body"><h5 id="totalPlans">-</h5><small>学习计划</small></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script th:src="@{/static/js/main.js}"></script>
</body>
</html>
