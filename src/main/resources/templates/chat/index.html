<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天 - AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/style.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot"></i> AI校园学习助手</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/chat"><i class="bi bi-chat-dots"></i> AI聊天</a></li>
                    <li class="nav-item"><a class="nav-link" href="/article"><i class="bi bi-pencil"></i> 作文</a></li>
                    <li class="nav-item"><a class="nav-link" href="/plan"><i class="bi bi-calendar-check"></i> 计划</a></li>
                    <li class="nav-item"><a class="nav-link" href="/code"><i class="bi bi-code-slash"></i> 代码</a></li>
                </ul>
                <div class="d-flex" id="userNavArea">
                    <a href="/auth/login" class="btn btn-outline-light btn-sm me-2">登录</a>
                    <a href="/auth/register" class="btn btn-light btn-sm">注册</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <div class="col-md-3 mb-3">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-list"></i> 操作面板
                    </div>
                    <div class="card-body">
                        <button class="btn btn-outline-danger btn-sm w-100" onclick="deleteAllChats()">
                            <i class="bi bi-trash"></i> 清空聊天记录
                        </button>
                        <hr>
                        <button class="btn btn-outline-secondary btn-sm w-100" onclick="loadHistory()">
                            <i class="bi bi-clock-history"></i> 刷新历史
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-chat-dots text-primary"></i> AI智能对话</span>
                        <span id="chatStatus" class="badge bg-success">就绪</span>
                    </div>
                    <div class="card-body" id="chatMessages" style="height: 450px; overflow-y: auto;">
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-robot" style="font-size: 3rem;"></i>
                            <p class="mt-2">你好！我是AI学习助手，有什么问题可以问我。</p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="input-group">
                            <input type="text" id="messageInput" class="form-control" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMessage()">
                            <button class="btn btn-primary" onclick="sendMessage()">
                                <i class="bi bi-send"></i> 发送
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-3 mt-4 border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 AI校园学习助手系统 - 课程综合实训项目</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.4/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/highlight.min.js"></script>
    <script th:src="@{/static/js/main.js}"></script>
</body>
</html>
