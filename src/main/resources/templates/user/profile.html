<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot"></i> AI校园学习助手</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> 聊天</a></li>
                    <li class="nav-item"><a class="nav-link" href="/article"><i class="bi bi-pencil"></i> 作文</a></li>
                    <li class="nav-item"><a class="nav-link" href="/plan"><i class="bi bi-calendar-check"></i> 计划</a></li>
                    <li class="nav-item"><a class="nav-link" href="/code"><i class="bi bi-code-slash"></i> 代码</a></li>
                </ul>
                <div class="d-flex" id="userNavArea">
                    <a href="/auth/login" class="btn btn-outline-light btn-sm me-2">登录</a>
                    <a href="/auth/register" class="btn btn-light btn-sm">注册</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <h4><i class="bi bi-person-circle"></i> 个人中心</h4>
        <div class="row mt-3">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <div class="avatar-upload mb-3">
                            <img id="avatarImg" src="/static/img/default_avatar.png" class="rounded-circle" width="100" height="100" alt="头像">
                            <input type="file" id="avatarInput" class="d-none" accept="image/*" onchange="uploadAvatar()">
                            <button class="btn btn-sm btn-outline-secondary mt-2" onclick="document.getElementById('avatarInput').click()">更换头像</button>
                        </div>
                        <h5 id="profileNickname">用户名</h5>
                        <p id="profileEmail" class="text-muted">email@example.com</p>
                    </div>
                </div>
                <div class="card shadow-sm mt-3">
                    <div class="card-header">修改资料</div>
                    <div class="card-body">
                        <div class="mb-2">
                            <label class="form-label">昵称</label>
                            <input type="text" id="newNickname" class="form-control" placeholder="新昵称">
                            <button class="btn btn-primary btn-sm w-100 mt-2" onclick="updateNickname()">保存</button>
                        </div>
                        <hr>
                        <div class="mb-2">
                            <label class="form-label">修改密码</label>
                            <input type="password" id="oldPassword" class="form-control mb-1" placeholder="原密码">
                            <input type="password" id="newPassword" class="form-control" placeholder="新密码">
                            <button class="btn btn-warning btn-sm w-100 mt-2" onclick="changePassword()">修改密码</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header"><i class="bi bi-shield-lock"></i> 登录日志</div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-sm">
                                <thead><tr><th>IP地址</th><th>设备信息</th><th>登录时间</th></tr></thead>
                                <tbody id="loginLogsTable"><tr><td colspan="3" class="text-center">加载中...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-3 mt-4 border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 AI校园学习助手系统</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script th:src="@{/static/js/main.js}"></script>
</body>
</html>
