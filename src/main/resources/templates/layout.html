<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'AI校园学习助手'">AI校园学习助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/highlight-github.min.css}" rel="stylesheet">
    <link th:href="@{/static/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot"></i> AI校园学习助手</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> AI聊天</a></li>
                    <li class="nav-item"><a class="nav-link" href="/article"><i class="bi bi-pencil"></i> 作文生成</a></li>
                    <li class="nav-item"><a class="nav-link" href="/plan"><i class="bi bi-calendar-check"></i> 学习计划</a></li>
                    <li class="nav-item"><a class="nav-link" href="/code"><i class="bi bi-code-slash"></i> 代码解释</a></li>
                </ul>
                <div class="d-flex align-items-center" id="userNavArea">
                    <a href="/auth/login" class="btn btn-outline-light btn-sm me-2">登录</a>
                    <a href="/auth/register" class="btn btn-light btn-sm">注册</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-4" th:insert="~{::content}">
        <div id="content-placeholder">内容区域</div>
    </main>

    <footer class="bg-light py-3 mt-5 border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 AI校园学习助手系统 - 课程综合实训项目</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.4/marked.min.js"></script>
    <script th:src="@{/static/js/highlight.min.js}"></script>
    <script th:src="@{/static/js/main.js}"></script>
</body>
</html>
