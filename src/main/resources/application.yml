# ============================================================
# AI校园学习助手系统 - 应用配置
# ============================================================

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: AIStudyAssistant

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/AIStudyAssistant?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 10000

  # Thymeleaf 模板引擎配置
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
    servlet:
      content-type: text/html

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson JSON配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aistudy.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 服务器配置
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: 30s

# JWT 配置
jwt:
  secret: ${JWT_SECRET:ai-study-assistant-jwt-secret-key-2026-must-be-long-enough-for-hs256}
  expiration: 86400000  # 24小时（毫秒）

# AI 服务配置
ai:
  provider: ${AI_PROVIDER:deepseek}
  deepseek:
    api-key: ${AI_API_KEY:sk-d06277cf10114552bebd9d7ae5784833}
    api-base: https://api.deepseek.com/v1
    model: deepseek-chat
  openai:
    api-key: your-openai-api-key-here
    api-base: https://api.openai.com/v1
    model: gpt-3.5-turbo
  ollama:
    api-base: http://localhost:11434
    model: llama2

# 日志配置
logging:
  level:
    root: WARN
    com.aistudy: INFO
    org.springframework.web: WARN
  file:
    path: ./logs
    name: ./logs/app.log

# 应用自定义配置
app:
  upload-path: /tmp/uploads
  avatar-path: /tmp/uploads/avatars
  default-avatar: default_avatar.png
